<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathQuest Adventure</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ===================================================
       RESET Y VARIABLES GLOBALES
       =================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --purple-dark:  #4a0080;
      --purple-mid:   #7b2fff;
      --blue-mid:     #3a6fff;
      --pink-bright:  #ff3aad;
      --pink-light:   #ff80d0;
      --yellow:       #ffe94a;
      --green:        #2ecc71;
      --orange:       #ff8c42;
      --white:        #ffffff;
      --card-bg:      rgba(255 255 255 / 0.13);
      --card-border:  rgba(255 255 255 / 0.30);
      --radius-lg:    20px;
      --radius-xl:    32px;
      --shadow-text:  3px 3px 0px #4a0080, 6px 6px 0px rgba(0,0,0,0.25);
    }

    /* ===================================================
       FONDO CON GRADIENTE VIBRANTE
       =================================================== */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a004d 0%, #4a0080 30%, #7b2fff 60%, #3a6fff 80%, #ff3aad 100%);
      font-family: 'Nunito', sans-serif;
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }

    /* ===================================================
       CANVAS DE PARTÍCULAS (estrellas animadas)
       =================================================== */
    #starsCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ===================================================
       CONTENEDOR PRINCIPAL
       =================================================== */
    .page-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 32px 16px 48px;
    }

    /* ===================================================
       CABECERA: LOGO Y TÍTULO
       =================================================== */
    .header {
      text-align: center;
      margin-bottom: 28px;
      animation: bounceIn 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    .header-icon {
      font-size: 72px;
      line-height: 1;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      animation: floatIcon 3s ease-in-out infinite;
    }

    .game-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      letter-spacing: 2px;
      color: var(--yellow);
      text-shadow: var(--shadow-text);
      line-height: 1.1;
    }

    .game-subtitle {
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      font-weight: 800;
      color: var(--pink-light);
      margin-top: 8px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
      letter-spacing: 0.5px;
    }

    /* ===================================================
       TARJETA DEL FORMULARIO
       =================================================== */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 2px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 28px 28px 32px;
      animation: slideUp 0.7s 0.3s ease both;
    }

    .section-label {
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }

    /* ===================================================
       CAMPO DE NOMBRE
       =================================================== */
    .name-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: var(--radius-lg);
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 22px;
    }
    .name-input::placeholder { color: rgba(255,255,255,0.5); font-weight: 400; }
    .name-input:focus {
      border-color: var(--yellow);
      background: rgba(255,255,255,0.25);
    }

    /* ===================================================
       SELECTOR DE EDAD
       =================================================== */
    .age-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .age-btn {
      flex: 1 1 calc(16.6% - 10px);
      min-width: 52px;
      padding: 10px 6px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.30);
      border-radius: 14px;
      color: var(--white);
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.18s ease;
      text-align: center;
      line-height: 1.2;
    }
    .age-btn span {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      opacity: 0.75;
      margin-top: 1px;
    }
    .age-btn:hover {
      background: rgba(255,255,255,0.28);
      transform: translateY(-3px) scale(1.05);
      border-color: var(--pink-light);
    }
    .age-btn.selected {
      background: var(--pink-bright);
      border-color: var(--yellow);
      box-shadow: 0 0 16px rgba(255,58,173,0.7), 0 4px 12px rgba(0,0,0,0.3);
      transform: translateY(-3px) scale(1.08);
    }

    /* ===================================================
       SELECTOR DE AVATAR
       =================================================== */
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .avatar-btn {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      background: rgba(255,255,255,0.15);
      border: 3px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.18s ease;
      line-height: 1;
    }
    .avatar-btn:hover {
      background: rgba(255,255,255,0.28);
      transform: scale(1.12) rotate(-5deg);
      border-color: var(--pink-light);
    }
    .avatar-btn.selected {
      background: rgba(255, 233, 74, 0.25);
      border-color: var(--yellow);
      box-shadow: 0 0 20px rgba(255,233,74,0.6), 0 4px 12px rgba(0,0,0,0.3);
      transform: scale(1.15);
    }

    .mode-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
    }
    .mode-btn {
      flex: 1;
      min-width: 120px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      color: #fff;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .mode-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    .mode-btn.selected {
      background: linear-gradient(135deg, #ff3aad, #ff7a3a);
      border-color: var(--yellow);
      box-shadow: 0 8px 20px rgba(255,58,173,0.3);
    }
    .gh-mode, .gh-best {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      background: rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 10px 16px;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gh-mode { color: var(--pink-light); }
    .gh-best { color: var(--yellow); }

    /* ===================================================
       BOTÓN JUGAR
       =================================================== */
    .play-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #ff3aad, #ff7a3a);
      border: none;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      color: var(--white);
      letter-spacing: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 6px 0 #a0004f, 0 10px 30px rgba(255,58,173,0.5);
      text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
    }
    .play-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 50%; height: 200%;
      background: rgba(255,255,255,0.25);
      transform: skewX(-20deg);
      animation: shimmer 2.5s infinite;
    }
    .play-btn:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 10px 0 #a0004f, 0 16px 40px rgba(255,58,173,0.65);
    }
    .play-btn:active {
      transform: translateY(3px) scale(0.98);
      box-shadow: 0 2px 0 #a0004f, 0 4px 16px rgba(255,58,173,0.4);
    }

    /* ===================================================
       PANTALLA DE JUEGO
       =================================================== */
    #gameScreen {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 48px;
      animation: fadeIn 0.5s ease;
    }
    #gameScreen.visible { display: block; }

    /* --- Header del juego --- */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 2px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 14px 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }

    /* Jugador: avatar + nombre */
    .gh-player {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .gh-avatar {
      font-size: 2.2rem;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
      animation: floatIcon 3s ease-in-out infinite;
    }
    .gh-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: var(--yellow);
      text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    }

    /* Contador de reto */
    .gh-reto {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--white);
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 6px 16px;
      border: 2px solid rgba(255,255,255,0.25);
    }
    .gh-reto span { color: var(--yellow); }

    /* Puntuación */
    .gh-score {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: var(--white);
    }
    .gh-score-val {
      color: var(--yellow);
      font-size: 1.5rem;
      text-shadow: 0 0 12px rgba(255,233,74,0.5);
      transition: transform 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    .gh-score-val.pop {
      animation: scorePop 0.4s ease;
    }

    /* --- Barra de progreso --- */
    .progress-bar-wrap {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink-bright), var(--yellow));
      border-radius: 10px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 10px rgba(255,233,74,0.4);
    }

    /* --- Tarjeta de la pregunta --- */
    .question-card {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border: 2px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 30px 24px 28px;
      text-align: center;
      animation: slideUp 0.5s ease both;
    }

    .question-label {
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--pink-light);
      margin-bottom: 6px;
    }
    .question-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.3rem, 4vw, 1.7rem);
      color: var(--white);
      margin-bottom: 28px;
      opacity: 0.85;
    }

    /* --- Burbujas de números --- */
    .bubbles-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }

    .bubble {
      width: clamp(58px, 12vw, 76px);
      height: clamp(58px, 12vw, 76px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      position: relative;
      animation: bubbleIn 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    /* Burbuja normal: número dado */
    .bubble.num {
      background: linear-gradient(135deg, #7b2fff, #3a6fff);
      border: 3px solid rgba(255,255,255,0.35);
      color: var(--white);
      box-shadow: 0 6px 0 rgba(0,0,0,0.2), 0 0 20px rgba(123,47,255,0.4);
    }
    /* Burbuja del hueco: "?" */
    .bubble.gap {
      background: rgba(255,255,255,0.08);
      border: 3px dashed rgba(255,233,74,0.8);
      color: var(--yellow);
      box-shadow: 0 0 20px rgba(255,233,74,0.2);
      animation: floatIcon 2s ease-in-out infinite, bubbleIn 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    .bubble.count-emoji {
      width: auto;
      min-width: 180px;
      min-height: 120px;
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-size: 2.2rem;
      line-height: 1.1;
      white-space: normal;
      text-align: center;
    }

    /* Separadores entre burbujas */
    .bubble-sep {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: rgba(255,255,255,0.5);
      user-select: none;
    }

    /* Retrasos escalonados para la animación */
    .bubble:nth-child(1)  { animation-delay: 0.00s; }
    .bubble:nth-child(3)  { animation-delay: 0.08s; }
    .bubble:nth-child(5)  { animation-delay: 0.16s; }
    .bubble:nth-child(7)  { animation-delay: 0.24s; }
    .bubble:nth-child(9)  { animation-delay: 0.32s; }

    /* --- Input de respuesta --- */
    .answer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .answer-input {
      width: 130px;
      padding: 14px 10px;
      background: rgba(255,255,255,0.18);
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: var(--radius-lg);
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: var(--white);
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .answer-input::placeholder { color: rgba(255,255,255,0.3); font-size: 1.2rem; }
    .answer-input:focus {
      border-color: var(--yellow);
      background: rgba(255,255,255,0.25);
      box-shadow: 0 0 20px rgba(255,233,74,0.3);
    }

    /* --- Botón Comprobar --- */
    .check-btn {
      padding: 14px 32px;
      background: linear-gradient(135deg, #2ecc71, #1aab57);
      border: none;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--white);
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 5px 0 #0d6b38, 0 8px 24px rgba(46,204,113,0.4);
      text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
    }
    .check-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 50%; height: 200%;
      background: rgba(255,255,255,0.25);
      transform: skewX(-20deg);
      animation: shimmer 2.5s infinite;
    }
    .check-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 0 #0d6b38, 0 14px 32px rgba(46,204,113,0.55);
    }
    .check-btn:active {
      transform: translateY(2px) scale(0.97);
      box-shadow: 0 2px 0 #0d6b38;
    }
    .check-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* --- Feedback (correcto / casi) --- */
    .feedback-box {
      margin-top: 22px;
      padding: 16px 24px;
      border-radius: var(--radius-lg);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      text-align: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
      pointer-events: none;
    }
    .feedback-box.show {
      opacity: 1;
      transform: scale(1);
    }
    .feedback-box.correct {
      background: rgba(46, 204, 113, 0.25);
      border: 2px solid rgba(46, 204, 113, 0.6);
      color: #7dffb3;
      box-shadow: 0 0 24px rgba(46,204,113,0.3);
    }
    .feedback-box.wrong {
      background: rgba(255, 140, 66, 0.25);
      border: 2px solid rgba(255, 140, 66, 0.6);
      color: #ffc07a;
      box-shadow: 0 0 24px rgba(255,140,66,0.3);
    }

    /* --- Pantalla de resultados finales --- */
    .results-screen {
      display: none;
      text-align: center;
      padding: 10px 0 20px;
      animation: bounceIn 0.7s ease both;
    }
    .results-screen.visible { display: block; }

    .results-trophy {
      font-size: 90px;
      animation: floatIcon 2.5s ease-in-out infinite;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
    }
    .results-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 7vw, 3rem);
      color: var(--yellow);
      text-shadow: var(--shadow-text);
      margin-top: 16px;
    }
    .results-score-label {
      font-size: 1rem;
      font-weight: 800;
      color: rgba(255,255,255,0.7);
      margin-top: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .results-score-big {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(3rem, 10vw, 5rem);
      color: var(--yellow);
      text-shadow: var(--shadow-text);
      line-height: 1;
    }
    .results-msg {
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 700;
      color: var(--white);
      opacity: 0.85;
      margin-top: 10px;
      padding: 0 20px;
    }

    .results-stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 18px 0;
      font-size: 2.4rem;
    }
    .results-stars span {
      animation: starPop 0.4s ease both;
    }
    .results-stars span:nth-child(1) { animation-delay: 0.1s; }
    .results-stars span:nth-child(2) { animation-delay: 0.25s; }
    .results-stars span:nth-child(3) { animation-delay: 0.4s; }
    .results-stars span:nth-child(4) { animation-delay: 0.55s; }
    .results-stars span:nth-child(5) { animation-delay: 0.7s; }

    .results-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .btn-replay {
      padding: 16px 36px;
      background: linear-gradient(135deg, #ff3aad, #ff7a3a);
      border: none;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--white);
      cursor: pointer;
      box-shadow: 0 5px 0 #a0004f, 0 10px 24px rgba(255,58,173,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
    }
    .btn-replay:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 0 #a0004f, 0 14px 32px rgba(255,58,173,0.55);
    }

    .btn-home {
      padding: 16px 36px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-home:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.04);
    }

    /* ===================================================
       ANIMACIONES
       =================================================== */
    @keyframes bounceIn {
      0%   { opacity: 0; transform: scale(0.6) translateY(-30px); }
      60%  { opacity: 1; transform: scale(1.05) translateY(5px); }
      100% { transform: scale(1) translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes shimmer {
      0%   { left: -60%; }
      100% { left: 130%; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes bubbleIn {
      0%   { opacity: 0; transform: scale(0) rotate(-15deg); }
      70%  { transform: scale(1.1) rotate(3deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes scorePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.5); }
      100% { transform: scale(1); }
    }
    @keyframes starPop {
      0%   { opacity: 0; transform: scale(0) rotate(-20deg); }
      70%  { transform: scale(1.3) rotate(5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      40%       { transform: translateX(10px); }
      60%       { transform: translateX(-8px); }
      80%       { transform: translateX(8px); }
    }

    /* ===================================================
       RESPONSIVE
       =================================================== */
    @media (max-width: 480px) {
      .card { padding: 20px 16px 24px; }
      .avatar-grid { gap: 7px; }
      .age-btn { min-width: 44px; font-size: 1rem; }
      .game-header { padding: 10px 14px; }
      .bubble { width: 52px; height: 52px; font-size: 1.3rem; }
      .bubbles-row { gap: 7px; }
    }
  </style>
</head>
<body>

  <canvas id="starsCanvas"></canvas>

  <!-- ===================================================
       PANTALLA PRINCIPAL (Inicio)
       =================================================== -->
  <div class="page-wrapper" id="mainScreen">

    <header class="header">
      <span class="header-icon">🧮</span>
      <h1 class="game-title">MathQuest<br>Adventure</h1>
      <p class="game-subtitle">¡La aventura matemática empieza! 🌟</p>
    </header>

    <div class="card">

      <p class="section-label">✏️ Tu nombre</p>
      <input
        type="text"
        id="playerName"
        class="name-input"
        placeholder="¿Cómo te llamas?"
        maxlength="12"
        autocomplete="off"
        spellcheck="false"
      />

      <p class="section-label">🎂 Tu edad</p>
      <div class="age-grid" id="ageGrid"></div>

      <p class="section-label">🎭 Elige tu personaje</p>
      <div class="avatar-grid" id="avatarGrid"></div>

      <p class="section-label">🎲 Elige tu juego</p>
      <div class="mode-grid" id="modeGrid"></div>

      <button class="play-btn" onclick="startGame()">
        🎮 ¡JUGAR!
      </button>

    </div>
  </div>

  <!-- ===================================================
       PANTALLA DE JUEGO
       =================================================== -->
  <div id="gameScreen">

    <!-- Header con info del jugador -->
    <div class="game-header">
      <div class="gh-player">
        <span class="gh-avatar" id="ghAvatar">🦊</span>
        <span class="gh-name" id="ghName">Jugador</span>
      </div>
      <div class="gh-mode">Modo <span id="ghModeName">Series</span></div>
      <div class="gh-reto">Reto <span id="ghCurrent">1</span> de <span id="ghTotal">5</span></div>
      <div class="gh-score">⭐ <span class="gh-score-val" id="ghScore">0</span></div>
      <div class="gh-best">🏅 Mejor <span id="ghBestScore">0</span></div>
    </div>

    <!-- Barra de progreso -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <!-- Zona de la pregunta -->
    <div id="questionZone">
      <div class="question-card" id="questionCard">

<p class="question-label" id="questionLabel">¿Qué número falta?</p>
        <p class="question-title" id="questionHint">Encuentra el patrón de la serie</p>

        <!-- Burbujas de la serie -->
        <div class="bubbles-row" id="bubblesRow"></div>

        <!-- Input + Botón -->
        <div class="answer-row">
          <input
            type="number"
            id="answerInput"
            class="answer-input"
            placeholder="?"
            min="0"
            max="999"
          />
          <button class="check-btn" id="checkBtn" onclick="checkAnswer()">
            ✔ Comprobar
          </button>
        </div>

        <!-- Feedback -->
        <div class="feedback-box" id="feedbackBox"></div>

      </div>
    </div>

    <!-- Pantalla de resultados (al terminar las 5 preguntas) -->
    <div class="results-screen" id="resultsScreen">
      <div class="results-trophy" id="resultsTrophy">🏆</div>
      <h2 class="results-title" id="resultsTitle">¡Aventura completada!</h2>
      <p class="results-score-label">Puntuación final</p>
      <p class="results-score-big" id="resultsBig">0</p>
      <div class="results-stars" id="resultsStars"></div>
      <p class="results-msg" id="resultsMsg">¡Eres increíble!</p>
      <div class="results-btns">
        <button class="btn-replay" onclick="replayGame()">🔄 ¡Otra vez!</button>
        <button class="btn-home" onclick="goHome()">🏠 Inicio</button>
      </div>
    </div>

  </div><!-- fin gameScreen -->


  <!-- ===================================================
       JAVASCRIPT
       =================================================== -->
  <script>
    /* --------------------------------------------------
       ESTADO DEL JUGADOR
       -------------------------------------------------- */
    const player = {
      name:      '',
      age:       null,
      avatar:    '🦊',
      bestScore: 0
    };

    /* --------------------------------------------------
       GENERACIÓN DE BOTONES DE EDAD
       -------------------------------------------------- */
    const ages = [5, 6, 7, 8, 9, 10];
    const ageGrid = document.getElementById('ageGrid');

    ages.forEach(age => {
      const btn = document.createElement('button');
      btn.className = 'age-btn';
      btn.innerHTML = `${age}<span>años</span>`;
      btn.setAttribute('aria-label', `${age} años`);
      btn.addEventListener('click', () => {
        player.age = age;
        document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
      ageGrid.appendChild(btn);
    });

    /* --------------------------------------------------
       GENERACIÓN DE AVATARES
       -------------------------------------------------- */
    const avatars = ['🦊', '🐸', '🦁', '🐧', '🦄', '🤖'];
    const avatarGrid = document.getElementById('avatarGrid');

    avatars.forEach(emoji => {
      const btn = document.createElement('button');
      btn.className = 'avatar-btn';
      if (emoji === player.avatar) btn.classList.add('selected');
      btn.textContent = emoji;
      btn.setAttribute('aria-label', `Avatar ${emoji}`);
      btn.addEventListener('click', () => {
        player.avatar = emoji;
        document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
      avatarGrid.appendChild(btn);
    });

    const modeGrid = document.getElementById('modeGrid');
    const gameModes = [
      { id: 'series', label: 'Series', emoji: '➰' },
      { id: 'conteo', label: 'Conteo', emoji: '🧮' }
    ];
    let gameMode = 'series';
    let questions = [];
    const STORAGE_PREFIX = 'mathquest_bestScore_';

    function getBestScoreKey(name) {
      return STORAGE_PREFIX + encodeURIComponent(name.trim().toLowerCase());
    }

    function loadBestScore(name) {
      const stored = localStorage.getItem(getBestScoreKey(name));
      return stored ? parseInt(stored, 10) || 0 : 0;
    }

    function saveBestScore(name, score) {
      localStorage.setItem(getBestScoreKey(name), String(score));
    }

    function setGameMode(mode) {
      gameMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.mode === mode);
      });
      document.getElementById('ghModeName').textContent = mode === 'conteo' ? 'Conteo' : 'Series';
    }

    gameModes.forEach(mode => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn';
      btn.dataset.mode = mode.id;
      btn.innerHTML = `${mode.emoji} ${mode.label}`;
      btn.addEventListener('click', () => setGameMode(mode.id));
      modeGrid.appendChild(btn);
    });
    setGameMode(gameMode);

    /* --------------------------------------------------
       GENERADOR DE SERIES POR NIVEL
       -------------------------------------------------- */

    /**
     * Devuelve un array de series según la edad.
     * Cada serie es: { numbers: [...], gapIndex: N, answer: X, hint: '...' }
     */
    function generateSeries(age) {
      const allSeries = [];

      if (age <= 6) {
        // Nivel fácil: series de 2 en 2, 1 en 1 hasta el 20
        const pools = [
          // serie de 2 en 2
          { seq: [2,4,6,8,10], hint: 'Serie de 2 en 2' },
          { seq: [4,6,8,10,12], hint: 'Serie de 2 en 2' },
          { seq: [1,2,3,4,5], hint: 'Serie de 1 en 1' },
          { seq: [6,7,8,9,10], hint: 'Serie de 1 en 1' },
          { seq: [10,12,14,16,18], hint: 'Serie de 2 en 2' },
          { seq: [2,4,6,8,10,12], hint: 'Serie de 2 en 2' },
          { seq: [1,3,5,7,9], hint: 'Serie de 2 en 2' },
          { seq: [5,6,7,8,9], hint: 'Serie de 1 en 1' },
          { seq: [8,10,12,14,16], hint: 'Serie de 2 en 2' },
          { seq: [3,4,5,6,7], hint: 'Serie de 1 en 1' },
        ];
        shuffle(pools).slice(0, 5).forEach(p => {
          const gapIdx = randomGapIndex(p.seq.length);
          allSeries.push({ numbers: p.seq, gapIndex: gapIdx, answer: p.seq[gapIdx], hint: p.hint });
        });

      } else if (age <= 8) {
        // Nivel medio: series de 3 en 3, 5 en 5 hasta el 50
        const pools = [
          { seq: [3,6,9,12,15], hint: 'Serie de 3 en 3' },
          { seq: [5,10,15,20,25], hint: 'Serie de 5 en 5' },
          { seq: [10,15,20,25,30], hint: 'Serie de 5 en 5' },
          { seq: [6,9,12,15,18], hint: 'Serie de 3 en 3' },
          { seq: [15,20,25,30,35], hint: 'Serie de 5 en 5' },
          { seq: [9,12,15,18,21], hint: 'Serie de 3 en 3' },
          { seq: [20,25,30,35,40], hint: 'Serie de 5 en 5' },
          { seq: [12,15,18,21,24], hint: 'Serie de 3 en 3' },
          { seq: [25,30,35,40,45], hint: 'Serie de 5 en 5' },
          { seq: [30,33,36,39,42], hint: 'Serie de 3 en 3' },
        ];
        shuffle(pools).slice(0, 5).forEach(p => {
          const gapIdx = randomGapIndex(p.seq.length);
          allSeries.push({ numbers: p.seq, gapIndex: gapIdx, answer: p.seq[gapIdx], hint: p.hint });
        });

      } else {
        // Nivel avanzado: series mixtas, con sumas y restas
        const pools = [
          { seq: [50,45,40,35,30], hint: 'Serie restando 5' },
          { seq: [100,90,80,70,60], hint: 'Serie restando 10' },
          { seq: [2,4,8,16,32], hint: 'Serie doble' },
          { seq: [1,4,7,10,13], hint: 'Serie de 3 en 3' },
          { seq: [20,17,14,11,8], hint: 'Serie restando 3' },
          { seq: [5,10,20,40,80], hint: 'Serie doble' },
          { seq: [64,32,16,8,4], hint: 'Serie a la mitad' },
          { seq: [3,7,11,15,19], hint: 'Serie de 4 en 4' },
          { seq: [100,75,50,25,0], hint: 'Serie restando 25' },
          { seq: [1,2,4,8,16,32], hint: 'Serie doble' },
        ];
        shuffle(pools).slice(0, 5).forEach(p => {
          const gapIdx = randomGapIndex(p.seq.length);
          allSeries.push({ numbers: p.seq, gapIndex: gapIdx, answer: p.seq[gapIdx], hint: p.hint });
        });
      }

      return allSeries;
    }

    function generateQuestions(age, mode) {
      return mode === 'conteo' ? generateCountQuestions(age) : generateSeries(age);
    }

    function generateCountQuestions(age) {
      const items = [
        { emoji: '🍎', label: 'manzanas' },
        { emoji: '🍌', label: 'bananas' },
        { emoji: '🍇', label: 'uvas' },
        { emoji: '🍓', label: 'fresas' },
        { emoji: '🍒', label: 'cerezas' },
        { emoji: '🍍', label: 'piñas' },
        { emoji: '🥕', label: 'zanahorias' },
        { emoji: '🍋', label: 'limones' }
      ];
      return Array.from({ length: 5 }, () => {
        const item = items[Math.floor(Math.random() * items.length)];
        const count = Math.floor(Math.random() * 6) + 3;
        return {
          type: 'conteo',
          emoji: item.emoji,
          label: item.label,
          display: item.emoji.repeat(count),
          answer: count,
          hint: 'Cuenta los emojis'
        };
      });
    }

    /* Barajar array (Fisher–Yates) */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    /* Índice de hueco: ni el primero ni el último siempre, para que haya contexto */
    function randomGapIndex(len) {
      // Elegir entre el índice 1 y len-2 para que haya burbujas a ambos lados
      const min = 1;
      const max = len - 2;
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    /* --------------------------------------------------
       ESTADO DEL JUEGO
       -------------------------------------------------- */
    let currentQ = 0;
    let score = 0;
    const TOTAL_Q = 5;

    /* --------------------------------------------------
       ARRANCAR EL JUEGO (desde pantalla de inicio)
       -------------------------------------------------- */
    function startGame() {
      const nameInput = document.getElementById('playerName');
      const name = nameInput.value.trim();

      if (!name) {
        nameInput.style.borderColor = '#ff4a4a';
        nameInput.setAttribute('placeholder', '⚠️ ¡Escribe tu nombre primero!');
        setTimeout(() => {
          nameInput.style.borderColor = '';
          nameInput.setAttribute('placeholder', '¿Cómo te llamas?');
        }, 1800);
        nameInput.focus();
        return;
      }

      player.name = name;
      player.bestScore = loadBestScore(player.name);

      // Si no eligió edad, asignamos 7 como default
      const age = player.age || 7;

      // Generar preguntas según modo y edad
      questions = generateQuestions(age, gameMode);
      currentQ = 0;
      score = 0;

      // Actualizar header del juego
      document.getElementById('ghAvatar').textContent = player.avatar;
      document.getElementById('ghName').textContent   = player.name;
      document.getElementById('ghTotal').textContent  = TOTAL_Q;
      document.getElementById('ghScore').textContent  = score;
      document.getElementById('ghBestScore').textContent = player.bestScore;
      document.getElementById('ghModeName').textContent = gameMode === 'conteo' ? 'Conteo' : 'Series';

      // Cambiar pantallas
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('gameScreen').classList.add('visible');

      // Mostrar primera pregunta
      showQuestion();
    }

    /* --------------------------------------------------
       MOSTRAR PREGUNTA ACTUAL
       -------------------------------------------------- */
    function showQuestion() {
      const q = questions[currentQ];

      // Ocultar resultados, mostrar zona de pregunta
      document.getElementById('resultsScreen').classList.remove('visible');
      document.getElementById('questionZone').style.display = '';

      // Actualizar header
      document.getElementById('ghCurrent').textContent = currentQ + 1;

      // Barra de progreso
      const pct = (currentQ / TOTAL_Q) * 100;
      document.getElementById('progressBar').style.width = pct + '%';

      const questionLabel = document.getElementById('questionLabel');
      const questionHint  = document.getElementById('questionHint');
      const row           = document.getElementById('bubblesRow');
      row.innerHTML = '';

      if (q.type === 'conteo') {
        questionLabel.textContent = `¿Cuántas ${q.label} hay?`;
        questionHint.textContent = q.hint;

        const bub = document.createElement('div');
        bub.className = 'bubble count-emoji';
        bub.textContent = q.display;
        bub.style.animationDelay = '0s';
        row.appendChild(bub);
      } else {
        questionLabel.textContent = '¿Qué número falta?';
        questionHint.textContent = q.hint + ' 🔢';

        q.numbers.forEach((num, idx) => {
          if (idx > 0) {
            const sep = document.createElement('span');
            sep.className = 'bubble-sep';
            sep.textContent = ',';
            row.appendChild(sep);
          }

          const bub = document.createElement('div');

          if (idx === q.gapIndex) {
            bub.className = 'bubble gap';
            bub.textContent = '?';
          } else {
            bub.className = 'bubble num';
            bub.textContent = num;
          }

          bub.style.animationDelay = (idx * 0.08) + 's';
          row.appendChild(bub);
        });
      }

      // Limpiar input y feedback
      const input = document.getElementById('answerInput');
      input.value = '';
      input.disabled = false;
      input.focus();

      const fb = document.getElementById('feedbackBox');
      fb.className = 'feedback-box';
      fb.textContent = '';

      document.getElementById('checkBtn').disabled = false;
    }

    /* --------------------------------------------------
       COMPROBAR RESPUESTA
       -------------------------------------------------- */
    function checkAnswer() {
      const input = document.getElementById('answerInput');
      const val = input.value.trim();

      // Validar que haya escrito algo
      if (val === '') {
        input.style.animation = 'shake 0.4s ease';
        setTimeout(() => input.style.animation = '', 450);
        input.focus();
        return;
      }

      const userAnswer = parseInt(val, 10);
      const correct    = questions[currentQ].answer;
      const fb         = document.getElementById('feedbackBox');

      // Deshabilitar botón y input mientras se muestra feedback
      document.getElementById('checkBtn').disabled = true;
      input.disabled = true;

      if (userAnswer === correct) {
        // CORRECTO
        score += 20;
        document.getElementById('ghScore').textContent = score;

        // Animación pop en la puntuación
        const scoreEl = document.getElementById('ghScore');
        scoreEl.classList.remove('pop');
        void scoreEl.offsetWidth; // reflow para reiniciar animación
        scoreEl.classList.add('pop');

        fb.className = 'feedback-box correct show';
        fb.textContent = getCorrectMsg();

        // Actualizar burbuja del hueco para mostrar la respuesta
        const gaps = document.querySelectorAll('.bubble.gap');
        gaps.forEach(g => {
          g.textContent = correct;
          g.style.background = 'linear-gradient(135deg, #2ecc71, #1aab57)';
          g.style.borderStyle = 'solid';
          g.style.color = '#fff';
        });

      } else {
        // INCORRECTO (mensaje amable)
        fb.className = 'feedback-box wrong show';
        fb.textContent = getWrongMsg(correct);
      }

      // Avanzar automáticamente tras 1.5 s
      setTimeout(() => {
        currentQ++;
        if (currentQ < TOTAL_Q) {
          showQuestion();
        } else {
          showResults();
        }
      }, 1600);
    }

    /* Mensajes variados para correcto */
    function getCorrectMsg() {
      const msgs = [
        '¡GENIAL! 🌟', '¡PERFECTO! 🎉', '¡BRILLANTE! ✨',
        '¡INCREÍBLE! 🚀', '¡LO TIENES! 💫', '¡SÚPER! ⭐'
      ];
      return msgs[Math.floor(Math.random() * msgs.length)];
    }

    /* Mensajes variados para casi correcto */
    function getWrongMsg(correct) {
      const msgs = [
        `¡Casi! El número era ${correct} 💪`,
        `¡Buen intento! Era el ${correct} 🌈`,
        `¡Sigue así! La respuesta era ${correct} 🔥`,
        `¡No te rindas! Era ${correct} ⚡`,
      ];
      return msgs[Math.floor(Math.random() * msgs.length)];
    }

    /* --------------------------------------------------
       ENTER en el input también comprueba
       -------------------------------------------------- */
    document.getElementById('answerInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAnswer();
    });

    /* --------------------------------------------------
       PANTALLA DE RESULTADOS FINALES
       -------------------------------------------------- */
    function showResults() {
      document.getElementById('questionZone').style.display = 'none';
      const rs = document.getElementById('resultsScreen');
      rs.classList.add('visible');

      // Barra de progreso al 100%
      document.getElementById('progressBar').style.width = '100%';

      // Puntuación final
      document.getElementById('resultsBig').textContent = score;

      // Mensaje y trofeo según puntuación (sobre 100)
      let trophy, title, msg, starsCount;

      if (score === 100) {
        trophy = '🏆'; title = '¡PERFECTO!'; starsCount = 5;
        msg = `¡${player.name}, eres un genio de las matemáticas! 🤩`;
      } else if (score >= 80) {
        trophy = '🥇'; title = '¡INCREÍBLE!'; starsCount = 4;
        msg = `¡Casi perfecto, ${player.name}! ¡Sigue así! 🚀`;
      } else if (score >= 60) {
        trophy = '🥈'; title = '¡MUY BIEN!'; starsCount = 3;
        msg = `¡Gran trabajo, ${player.name}! ¡A por más! ⭐`;
      } else if (score >= 40) {
        trophy = '🥉'; title = '¡BUEN INTENTO!'; starsCount = 2;
        msg = `¡Vas mejorando, ${player.name}! ¡Inténtalo otra vez! 💪`;
      } else {
        trophy = '🌱'; title = '¡SIGUE PRACTICANDO!'; starsCount = 1;
        msg = `¡No te rindas, ${player.name}! ¡Cada vez mejor! 🌟`;
      }

      if (score > player.bestScore) {
        player.bestScore = score;
        saveBestScore(player.name, score);
        document.getElementById('ghBestScore').textContent = player.bestScore;
        msg = `¡Nueva mejor puntuación, ${player.name}! ${msg}`;
      }

      document.getElementById('resultsTrophy').textContent = trophy;
      document.getElementById('resultsTitle').textContent  = title;
      document.getElementById('resultsMsg').textContent    = msg;

      // Estrellas
      const starsEl = document.getElementById('resultsStars');
      starsEl.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const s = document.createElement('span');
        s.textContent = i < starsCount ? '⭐' : '☆';
        starsEl.appendChild(s);
      }
    }

    /* --------------------------------------------------
       REPETIR PARTIDA (mismos datos del jugador)
       -------------------------------------------------- */
    function replayGame() {
      const age = player.age || 7;
      questions = generateQuestions(age, gameMode);
      currentQ = 0;
      score = 0;
      document.getElementById('ghScore').textContent = 0;
      document.getElementById('progressBar').style.width = '0%';
      showQuestion();
    }

    /* --------------------------------------------------
       VOLVER AL INICIO
       -------------------------------------------------- */
    function goHome() {
      document.getElementById('gameScreen').classList.remove('visible');
      document.getElementById('mainScreen').style.display = '';
    }

    /* --------------------------------------------------
       PARTÍCULAS / ESTRELLAS ANIMADAS (canvas)
       -------------------------------------------------- */
    (function initStars() {
      const canvas = document.getElementById('starsCanvas');
      const ctx    = canvas.getContext('2d');
      let W, H, stars;
      const STAR_COUNT = 120;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createStar() {
        return {
          x:       Math.random() * W,
          y:       Math.random() * H,
          r:       Math.random() * 2.8 + 0.4,
          speed:   Math.random() * 0.6 + 0.15,
          drift:   (Math.random() - 0.5) * 0.3,
          alpha:   Math.random() * 0.7 + 0.2,
          twinkle: Math.random() * Math.PI * 2
        };
      }

      function initStarArray() {
        stars = Array.from({ length: STAR_COUNT }, createStar);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.twinkle += 0.04;
          const glow = 0.5 + 0.5 * Math.sin(s.twinkle);
          ctx.globalAlpha = s.alpha * glow;

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();

          if (s.r > 1.8) {
            ctx.globalAlpha = (s.alpha * glow) * 0.4;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffe94a';
            ctx.fill();
          }

          s.y += s.speed;
          s.x += s.drift;

          if (s.y > H + 5) { s.y = -5;  s.x = Math.random() * W; }
          if (s.x > W + 5) { s.x = -5; }
          if (s.x < -5)    { s.x = W + 5; }
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      initStarArray();
      draw();
    })();
  </script>

</body>
</html>
